# Railway deploy config — https://docs.railway.com/guides/symfony
# Link a MySQL service to this app and set variables via .env.railway or scripts/railway-set-variables.ps1

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Uses Dockerfile CMD: start-web.sh (Nginx on $PORT + PHP-FPM)
startCommand = "/usr/local/bin/start-web.sh"
