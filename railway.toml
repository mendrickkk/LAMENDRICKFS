# Railway deploy config — https://docs.railway.com/guides/symfony
# Link a MySQL service to this app and set variables via .env.railway or scripts/railway-set-variables.ps1

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Migrations + cache run here (before the app container must pass healthcheck)
releaseCommand = "sh /usr/local/bin/release.sh"
healthcheckPath = "/health.html"
healthcheckTimeout = 120
# Use Dockerfile ENTRYPOINT + CMD — do not set a custom startCommand in the dashboard
