# Railway deploy config — https://docs.railway.com/guides/symfony
# Link a MySQL service to this app and set variables via .env.railway or scripts/railway-set-variables.ps1

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/"
healthcheckTimeout = 300
# Use Dockerfile ENTRYPOINT + CMD (entrypoint must run before start-web.sh)
# Do not override startCommand — it skips DB setup and breaks PORT startup
