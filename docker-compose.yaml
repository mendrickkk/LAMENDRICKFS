services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      # Set APP_SECRET in .env for production; fallback is for local Docker only
      APP_SECRET: ${APP_SECRET:-docker-local-change-me-before-production}
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}?serverVersion=8.0.43&charset=utf8mb4
      DEFAULT_URI: http://localhost:8081/
    volumes:
      - app_data:/var/www/html
      - uploads_data:/var/www/html/public/uploads
      - jwt_keys:/var/www/html/config/jwt
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mendrick_network

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - app_data:/var/www/html:ro
      - uploads_data:/var/www/html/public/uploads:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - mendrick_network

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - mendrick_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mendrick_network

volumes:
  mysql_data:
  app_data:
  uploads_data:
  jwt_keys:

networks:
  mendrick_network:
