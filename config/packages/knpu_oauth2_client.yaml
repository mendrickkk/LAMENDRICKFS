knpu_oauth2_client:
    clients:
        google:
            type: google
            client_id: '%env(default::GOOGLE_CLIENT_ID)%'
            client_secret: '%env(default::GOOGLE_CLIENT_SECRET)%'
            redirect_route: connect_google_check
            redirect_params: {}
            access_type: online
            hosted_domain: ~
            use_oidc_mode: true
            user_fields: [email]
