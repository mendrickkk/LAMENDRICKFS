security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        App\Entity\Users: 'auto'
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\Users
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false


        api_platform:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            user_checker: App\Security\ApiUserChecker
            json_login:
                check_path: /api/login
                username_path: email
                password_path: password
                success_handler: App\Security\JWTAuthenticationSuccessHandler
                failure_handler: App\Security\ApiAuthenticationFailureHandler
            jwt: ~  

        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\UserChecker
            access_denied_handler: App\EventListener\AccessDeniedHandler
            entry_point: App\Security\LoginAuthenticator
            custom_authenticators:
                - App\Security\LoginAuthenticator
                - App\Security\GoogleAuthenticator
            logout:
                path: app_logout
                target: app_login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800 # 1 week
                path: /
                always_remember_me: false

    # ROLE_CLIENT / ROLE_STAFF / ROLE_ADMIN each imply ROLE_USER for API is_granted checks
    role_hierarchy:
        ROLE_CLIENT: ROLE_USER
        ROLE_STAFF: ROLE_USER
        ROLE_ADMIN: [ROLE_STAFF, ROLE_USER]

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
        - { path: ^/admin/activity-logs, roles: ROLE_ADMIN }
        - { path: ^/admin/settings, roles: ROLE_ADMIN }
        - { path: ^/admin/users, roles: ROLE_ADMIN }
        - { path: ^/admin/profile, allow_if: "is_granted('ROLE_ADMIN') or is_granted('ROLE_STAFF')" }
        - { path: ^/admin, allow_if: "is_granted('ROLE_ADMIN') or is_granted('ROLE_STAFF')" }
        - { path: ^/orders, allow_if: "is_granted('ROLE_ADMIN') or is_granted('ROLE_STAFF')" }
        - { path: ^/connect, roles: PUBLIC_ACCESS }
        - { path: ^/verify-email, roles: PUBLIC_ACCESS }
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/category, roles: IS_AUTHENTICATED }
        - { path: ^/api/verify-email, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: IS_AUTHENTICATED }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/signup, roles: PUBLIC_ACCESS }
        - { path: ^/landing, roles: PUBLIC_ACCESS }
        - { path: ^/account, roles: ROLE_CLIENT }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
